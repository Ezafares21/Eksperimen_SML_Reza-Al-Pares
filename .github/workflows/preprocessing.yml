name: Automated Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    # Memberikan izin kepada bot untuk menulis/push data ke repo
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_Reza-Al-Pares.py

    - name: Commit and Push Clean Dataset
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add preprocessing/Credit_Scoring_Bank_preprocessing/
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated preprocessing clean dataset" && git push)
